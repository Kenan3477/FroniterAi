[phases.setup]
nixPkgs = ['nodejs-18_x', 'npm-9_x']

[phases.install]
cmds = [
  'echo "=== Railway Deployment - Workspace Configuration ==="',
  'pwd',
  'ls -la',
  'echo "Installing all workspace dependencies from root..."',
  'npm install',
  'echo "Checking backend directory after workspace install..."',
  'ls -la backend/'
]

[phases.build]
cmds = [
  'echo "Building backend via workspace..."',
  'pwd',
  'cd backend && npm run build'
]

[start]
cmd = 'cd backend && npm run start'

[variables]
NODE_ENV = 'production'