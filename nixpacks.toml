# Railway Backend Configuration - Node.js 20.x with proper dependency handling

[phases.setup]
cmds = ['echo "Installing workspace dependencies..."']

[phases.install] 
cmds = [
  # Monorepo: single lockfile at repo root — npm workspaces install all packages.
  # Do not run npm ci in frontend/backend (no per-package lockfiles; breaks Railway).
  'npm ci'
]

[phases.build]
cmds = [
  'echo "Building backend with workspace dependencies..."',
  'cd backend && npx prisma generate',
  'cd backend && npm run build'
]

[start]
cmd = 'cd backend && npm run start'